  <style>
    :root { color-scheme: dark; }
    body{
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b0b0b;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .card{
      width:min(560px, 92vw);
      background:#121212;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:26px;
      box-shadow:0 10px 40px rgba(0,0,0,.6);
      text-align:center;
      color:#fff;
    }
    h1{
      margin:0 0 10px 0;
      font-size:22px;
      font-weight:800;
    }
    p{
      margin:0 0 18px 0;
      opacity:.85;
      font-size:14px;
    }
    button{
      width:100%;
      padding:16px 18px;
      border:0;
      border-radius:12px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      background:#e50914;
      color:#fff;
      transition: transform .05s ease, opacity .2s ease;
    }
    button:active{ transform: scale(.99); }
    button[disabled]{ opacity:.55; cursor:not-allowed; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Acesso exclusivo</h1>
    <p>Clique abaixo para continuar.</p>
    <button id="cta" type="button">Continuar</button>
  </div>

  <script>
    const TELEGRAM_URL = "https://t.me/+hhhoa7AnqLBkNDE5";

    const btn = document.getElementById("cta");
    let clicked = false;

    function safeTrack(eventName){
      try {
        if (window.ttq && typeof window.ttq.track === "function") {
          window.ttq.track(eventName);
        }
      } catch (e) {}
    }

    btn.addEventListener("click", () => {
      if (clicked) return;
      clicked = true;
      btn.disabled = true;
      btn.textContent = "Abrindo...";

      // Evento padrão mais estável para otimização
      safeTrack("Lead");

      setTimeout(() => {
        window.location.href = TELEGRAM_URL;
      }, 650);
    });
  </script>
</body>
</html>
