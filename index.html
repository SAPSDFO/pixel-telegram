<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acesso exclusivo</title>

  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=1586573372457558&ev=PageView&noscript=1"
  /></noscript>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e4c97e;
      --dark: #0a0a0a;
      --text: #f0ece4;
      --text-muted: #a09880;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 40%, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 2.4rem;
    }
    .ornament-line { height: 1px; width: 60px; background: linear-gradient(90deg, transparent, var(--gold)); }
    .ornament-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
    .ornament-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 7vw, 3.4rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.15;
      margin-bottom: 1.4rem;
    }
    h1 span { color: var(--gold-light); }

    p {
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2.8rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 3rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.4s ease;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: var(--dark); }
    .btn span { position: relative; z-index: 1; }
    .btn.loading { pointer-events: none; opacity: 0.7; }

    .hint {
      margin-top: 1.4rem;
      font-size: 0.7rem;
      color: #5a5445;
      letter-spacing: 0.1em;
    }
    .ornament-bottom { margin-top: 3rem; }
  </style>
</head>
<body>

  <div class="container">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

    <h1>Acesso <span>exclusivo</span></h1>
    <p>Clique abaixo para continuar</p>

    <a class="btn" id="cta-btn" href="https://t.me/Melzzinhabot">
      <span id="btn-text">Continuar</span>
    </a>

    <div class="hint">Aguarde 1s após clicar.</div>

    <div class="ornament-bottom">
      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line right"></div>
      </div>
    </div>
  </div>

  <!-- Meta Pixel no final do body garante que dispara depois do DOM pronto -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '1586573372457558');

    // PageView disparado após o fbevents.js carregar
    fbq('track', 'PageView');

    // Botão: dispara Lead e redireciona
    document.getElementById('cta-btn').addEventListener('click', function(e) {
      e.preventDefault();
      var btn = this;
      var btnText = document.getElementById('btn-text');

      fbq('track', 'Lead');

      btnText.textContent = 'Aguarde…';
      btn.classList.add('loading');

      setTimeout(function() {
        window.location.href = 'https://t.me/Melzzinhabot';
      }, 1000);
    });
  </script>

</body>
</html>
