<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acesso exclusivo</title>

  <!-- Meta Pixel Code -->

  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e4c97e;
      --dark: #0a0a0a;
      --dark2: #141414;
      --text: #f0ece4;
      --text-muted: #a09880;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 50% 40%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 80% 50% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Decorative top line */
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 2.4rem;
      animation: fadeUp 1s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .ornament-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .ornament-line.right {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .ornament-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 7vw, 3.4rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1.4rem;
      animation: fadeUp 1s 0.18s cubic-bezier(0.22,1,0.36,1) both;
    }

    h1 span {
      color: var(--gold-light);
    }

    p {
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2.8rem;
      animation: fadeUp 1s 0.26s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn-wrap {
      animation: fadeUp 1s 0.36s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn {
      display: inline-block;
      padding: 1rem 3rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.4s ease;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: var(--dark); }

    .btn span { position: relative; z-index: 1; }

    .hint {
      margin-top: 1.4rem;
      font-size: 0.7rem;
      color: #5a5445;
      letter-spacing: 0.1em;
      animation: fadeUp 1s 0.44s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Bottom ornament */
    .ornament-bottom {
      margin-top: 3rem;
      animation: fadeUp 1s 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

    <h1>Acesso <span>exclusivo</span></h1>

    <p>Clique abaixo para continuar</p>

    <div class="btn-wrap">
      <button class="btn" onclick="handleClick(this)">
        <span>Continuar</span>
      </button>
    </div>

    <div class="hint">Aguarde 1s após clicar.</div>

    <div class="ornament-bottom">
      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line right"></div>
      </div>
    </div>
  </div>

  <script>
    function handleClick(btn) {
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Aguarde…';
      // fire Meta Pixel lead event
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Lead');
      }
      setTimeout(() => {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Continuar';
      }, 1500);
    }
  </script>
</body>
</html>
